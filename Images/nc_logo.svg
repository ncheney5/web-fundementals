<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <radialGradient id="fireGlow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#e86010" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#141c16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2e20"/>
      <stop offset="100%" stop-color="#141c16"/>
    </linearGradient>
  </defs>

  <!-- glow at bottom -->
  <ellipse cx="50" cy="108" rx="35" ry="12" fill="#e86010" opacity="0.3"/>

  <!-- kite shield body -->
  <path d="M10 8 L90 8 L90 72 Q90 95 50 115 Q10 95 10 72 Z"
        fill="url(#shieldGrad)"
        stroke="#e86010"
        stroke-width="2"/>

  <!-- inner shield border -->
  <path d="M17 14 L83 14 L83 70 Q83 90 50 108 Q17 90 17 70 Z"
        fill="none"
        stroke="#2e4d35"
        stroke-width="1"/>

  <!-- fire glow overlay -->
  <path d="M10 8 L90 8 L90 72 Q90 95 50 115 Q10 95 10 72 Z"
        fill="url(#fireGlow)"/>

  <!-- NC initials -->
  <text x="50" y="55"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="Georgia, serif"
        font-size="28"
        font-weight="bold"
        fill="#9ab0b8"
        letter-spacing="3">NC</text>

  <!-- small decorative line above -->
  <line x1="28" y1="38" x2="72" y2="38" stroke="#2e4d35" stroke-width="1"/>
  <!-- small decorative line below -->
  <line x1="28" y1="68" x2="72" y2="68" stroke="#2e4d35" stroke-width="1"/>

</svg>
